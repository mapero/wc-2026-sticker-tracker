# Two services:
#   sync — the Node + SQLite sync backend (data persisted in a named volume)
#   web  — the static SPA served by nginx, which proxies /api -> sync
#
# Uses the images published to GitHub Container Registry by the
# docker-publish workflow. Override the tag with IMAGE_TAG (default: latest).
# The build: sections are kept so `docker compose build` still works locally;
# `docker compose pull` / `up` use the registry images.
#
# Quick start:  docker compose pull && docker compose up -d   then open :8080
services:
    sync:
        image: ghcr.io/mapero/wc-2026-sticker-tracker-sync:${IMAGE_TAG:-latest}
        build: ./server
        restart: unless-stopped
        environment:
            PORT: "8787"
            SYNC_DB_PATH: /app/data/sync.db
        volumes:
            - sync-data:/app/data
        # Uncomment to reach the API directly (otherwise it's only used via web):
        # ports:
        #   - "8787:8787"

    web:
        image: ghcr.io/mapero/wc-2026-sticker-tracker-web:${IMAGE_TAG:-latest}
        build:
            context: .
            args:
                # Root-served; calls /api on its own origin (proxied to sync).
                VITE_BASE: /
                VITE_SYNC_URL: ""
        restart: unless-stopped
        ports:
            - "${WEB_PORT:-8080}:80"
        depends_on:
            - sync

volumes:
    sync-data:
